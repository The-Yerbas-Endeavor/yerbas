# This workflow has been split from the old monolithic Yerbas build.

name: Yerbas Build

on:
  push:
    branches:
      - v3.1*
      - 3.1*
      - 3.2*
      - dev
      - Codex
    tags:
      - v*
  pull_request:
    branches:
      - dev
      - Codex
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  COIN_NAME: yerbas
  BUILD_DIR: yerbas-build
  COMPRESS_DIR: yerbas-compress
  TEST_DIR: yerbas-test
  FALLBACK_DOWNLOAD_PATH: https://bitcoincore.org/depends-sources

permissions:
  contents: read
  checks: write
  id-token: write

jobs:
  get-version:
    name: Get Version
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.selected-version.outputs.version }}

    steps:
      - name: Triggered By
        run: |
          echo "checking out $GITHUB_REF triggered by $GITHUB_EVENT_NAME"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate Version Logic
        id: selected-version
        shell: bash
        run: |
          set -euo pipefail

          VERSION=$(grep '^release-version=' build.properties | cut -d'=' -f2)

          if [ -z "$VERSION" ]; then
            echo "release-version was not found in build.properties"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "BUILD_VERSION=$VERSION" > version.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: version
          path: version.txt

  build-ubuntu26-x86:
    name: Ubuntu 26 x86 Build
    needs: get-version
    runs-on: ubuntu-26.04
    env:
      ARCH_TYPE: x86
      OS: ubuntu-26.04
      HOST_TRIPLE: x86_64-pc-linux-gnu
      CONFIGURE_HOST: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Required Packages
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y curl build-essential libtool autotools-dev automake pkg-config python3 bsdmainutils cmake

      - name: Build Depends
        shell: bash
        run: |
          set -euo pipefail
          echo "building with $(nproc) threads"
          echo "using FALLBACK_DOWNLOAD_PATH=${FALLBACK_DOWNLOAD_PATH}"
          make -C depends -j$(nproc) HOST=${HOST_TRIPLE}

      - name: Configure
        shell: bash
        run: |
          set -euo pipefail
          ./autogen.sh
          ./configure --prefix=$(pwd)/depends/${HOST_TRIPLE} ${CONFIGURE_HOST} --disable-tests --disable-bench

      - name: Build Binaries
        shell: bash
        run: |
          set -euo pipefail
          make -j$(nproc)

          mkdir -p "${BUILD_DIR}" "${BUILD_DIR}_not_strip"

          found=0
          for f in src/yerbas-cli src/yerbasd src/yerbas-tx src/qt/yerbas-qt; do
            if [ -f "$f" ]; then
              cp "$f" "${BUILD_DIR}/"
              cp "$f" "${BUILD_DIR}_not_strip/"
              found=1
            else
              echo "Optional binary not found, skipping: $f"
            fi
          done

          if [ "$found" -eq 0 ]; then
            echo "No Yerbas binaries were found to package."
            exit 1
          fi

          strip "${BUILD_DIR}"/* || true

      - name: Build Debug Binaries
        shell: bash
        run: |
          set -euo pipefail
          make clean || true
          make distclean || true
          ./autogen.sh
          ./configure --prefix=$(pwd)/depends/${HOST_TRIPLE} ${CONFIGURE_HOST} --disable-tests --disable-bench --enable-debug
          make -j$(nproc)

          mkdir -p "${BUILD_DIR}_debug"

          found=0
          for f in src/yerbas-cli src/yerbasd src/yerbas-tx src/qt/yerbas-qt; do
            if [ -f "$f" ]; then
              cp "$f" "${BUILD_DIR}_debug/"
              found=1
            else
              echo "Optional debug binary not found, skipping: $f"
            fi
          done

          if [ "$found" -eq 0 ]; then
            echo "No Yerbas debug binaries were found to package."
            exit 1
          fi

      - name: Generate Checksum and Compress
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${COMPRESS_DIR}"

          for dir in "${BUILD_DIR}" "${BUILD_DIR}_debug" "${BUILD_DIR}_not_strip"; do
            case "$dir" in
              *_debug) suffix="debug" ;;
              *_not_strip) suffix="notstrip" ;;
              *) suffix="release" ;;
            esac

            rm -rf temp
            mkdir -p "temp/${BUILD_DIR}"

            cp "$dir"/* "temp/${BUILD_DIR}/"

            pushd "temp/${BUILD_DIR}"
            {
              echo "sha256:"
              echo "------------------------------------"
              for f in *; do
                [ "$f" = "checksums.txt" ] && continue
                shasum -a 256 "$f"
              done
              echo "------------------------------------"
              echo "sha256sum:"
              echo "------------------------------------"
              for f in *; do
                [ "$f" = "checksums.txt" ] && continue
                sha256sum "$f"
              done
            } > checksums.txt
            cat checksums.txt
            popd

            tar -czf "${COIN_NAME}-${OS}-${ARCH_TYPE}-${suffix}-${{ needs.get-version.outputs.version }}.tar.gz" -C temp "${BUILD_DIR}"
          done

          mv ./*.tar.gz "${COMPRESS_DIR}/"

          pushd "${COMPRESS_DIR}"
          {
            echo "Checksums for release archives:"
            echo "------------------------------------"
            for f in *.tar.gz; do
              echo "$f"
              echo "sha256: $(shasum -a 256 "$f")"
              echo "sha256sum: $(sha256sum "$f")"
              echo "------------------------------------"
            done
          } > checksums.txt
          cat checksums.txt
          popd

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.COIN_NAME }}-${{ env.OS }}-${{ env.ARCH_TYPE }}-${{ needs.get-version.outputs.version }}
          path: ${{ env.COMPRESS_DIR }}

