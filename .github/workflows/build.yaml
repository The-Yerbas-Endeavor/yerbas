  build-macos-13-x86:
    name: macOS 13 x86 Build
    needs: get-version
    runs-on: macos-15-intel
    env:
      MACOS_LABEL: macOS13
      ARCH_TYPE: x86
      OSX_HOST: x86_64-apple-darwin22

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Required Packages
        shell: bash
        run: |
          set -euo pipefail

          for pkg in automake libtool pkg-config miniupnpc librsvg libnatpmp zeromq python; do
            if ! brew list --versions "$pkg" >/dev/null 2>&1; then
              echo "Installing $pkg..."
              brew install "$pkg"
            else
              echo "$pkg already installed, skipping."
            fi
          done

          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install -U pip setuptools
          python -m pip install ds_store mac_alias
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Build Depends
        shell: bash
        run: |
          set -euo pipefail
          clang++ --version
          xcodebuild -version
          sw_vers
          echo "building with $(sysctl -n hw.ncpu) threads"
          echo "using FALLBACK_DOWNLOAD_PATH=${FALLBACK_DOWNLOAD_PATH}"
          make -C depends -j$(sysctl -n hw.ncpu) HOST=${OSX_HOST}

      - name: Configure
        shell: bash
        run: |
          set -euo pipefail
          ./autogen.sh
          ./configure \
            CXXFLAGS="-Wno-enum-constexpr-conversion -D_LIBCPP_ENABLE_CXX17_REMOVED_UNARY_BINARY_FUNCTION" \
            --prefix=$(pwd)/depends/${OSX_HOST} \
            --disable-bench || {
              echo "===== config.log boost/thread lines ====="
              grep -n -i "boost\|thread\|sleep\|chrono\|unary_function\|enum-constexpr" config.log || true
              exit 1
            }

      - name: Build Binaries
        shell: bash
        run: |
          set -euo pipefail
          make -j$(sysctl -n hw.ncpu)

          mkdir -p "${BUILD_DIR}" "${BUILD_DIR}_not_strip"

          found=0
          for f in src/yerbas-cli src/yerbasd src/yerbas-tx src/qt/yerbas-qt; do
            if [ -f "$f" ]; then
              cp "$f" "${BUILD_DIR}/"
              cp "$f" "${BUILD_DIR}_not_strip/"
              found=1
            else
              echo "Optional binary not found, skipping: $f"
            fi
          done

          if [ "$found" -eq 0 ]; then
            echo "No Yerbas binaries were found to package."
            exit 1
          fi

          for f in "${BUILD_DIR}"/*; do
            if [ -f "$f" ]; then
              xcrun strip -x "$f" || true
            fi
          done

          ls -l "${BUILD_DIR}"
          ls -l "${BUILD_DIR}_not_strip"

      - name: Generate Checksum and Compress
        shell: bash
        run: |
          set -euo pipefail
    
          PACKAGE_DIR="${COIN_NAME}-v${{ needs.get-version.outputs.version }}"
          PACKAGE_NOTSTRIP_DIR="${COIN_NAME}-v${{ needs.get-version.outputs.version }}-notstrip"
    
          pushd "${BUILD_DIR}"
          {
            echo "sha256:"
            for f in *; do
              [ "$f" = "checksums.txt" ] && continue
              shasum -a 256 "$f"
            done
            echo "openssl-sha256:"
            for f in *; do
              [ "$f" = "checksums.txt" ] && continue
              openssl sha256 "$f"
            done
          } > checksums.txt
          popd
    
          rm -rf "${PACKAGE_DIR}"
          cp -R "${BUILD_DIR}" "${PACKAGE_DIR}"
          /usr/bin/zip -r -9 "${COIN_NAME}-${MACOS_LABEL}-${ARCH_TYPE}-release-${{ needs.get-version.outputs.version }}.zip" "${PACKAGE_DIR}"
          rm -rf "${PACKAGE_DIR}"
    
          pushd "${BUILD_DIR}_not_strip"
          {
            echo "sha256:"
            for f in *; do
              [ "$f" = "checksums.txt" ] && continue
              shasum -a 256 "$f"
            done
            echo "openssl-sha256:"
            for f in *; do
              [ "$f" = "checksums.txt" ] && continue
              openssl sha256 "$f"
            done
          } > checksums.txt
          popd
    
          rm -rf "${PACKAGE_NOTSTRIP_DIR}"
          cp -R "${BUILD_DIR}_not_strip" "${PACKAGE_NOTSTRIP_DIR}"
          /usr/bin/zip -r -9 "${COIN_NAME}-${MACOS_LABEL}-${ARCH_TYPE}-notstrip-${{ needs.get-version.outputs.version }}.zip" "${PACKAGE_NOTSTRIP_DIR}"
          rm -rf "${PACKAGE_NOTSTRIP_DIR}"
    
          mkdir -p "${COMPRESS_DIR}"
          mv ./*.zip "${COMPRESS_DIR}/"
    
          pushd "${COMPRESS_DIR}"
          {
            echo "Checksums for release archives:"
            echo "------------------------------------"
            for f in *.zip; do
              echo "$f"
              echo "sha256: $(shasum -a 256 "$f")"
              echo "openssl-sha256: $(openssl sha256 "$f")"
              echo "------------------------------------"
            done
          } > checksums.txt
          cat checksums.txt
          popd

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.COIN_NAME }}-${{ env.MACOS_LABEL }}-${{ env.ARCH_TYPE }}-${{ needs.get-version.outputs.version }}
          path: ${{ env.COMPRESS_DIR }}

      - name: Generate macOS dmg files
        shell: bash
        run: |
          set -euo pipefail

          make deploy
          mkdir -p macos-dmg

          DMG_FILE=$(find . -maxdepth 1 -type f -name "*.dmg" -print -quit)
          if [ -z "$DMG_FILE" ]; then
            echo "No dmg file was generated by make deploy."
            exit 1
          fi

          mv "$DMG_FILE" "macos-dmg/Yerbas-Qt-${MACOS_LABEL}-${ARCH_TYPE}.dmg"

          pushd macos-dmg
          {
            for f in *.dmg; do
              echo "sha256: $(shasum -a 256 "$f")"
              echo "openssl-sha256: $(openssl sha256 "$f")"
            done
          } > checksums.txt
          cat checksums.txt
          popd

      - name: Upload dmg file
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.COIN_NAME }}-${{ env.MACOS_LABEL }}-${{ env.ARCH_TYPE }}-dmg-${{ needs.get-version.outputs.version }}
          path: macos-dmg

