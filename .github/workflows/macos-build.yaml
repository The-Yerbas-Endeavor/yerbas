# This workflow has been split from the old monolithic Yerbas build.

name: Yerbas Build for macOS

on:
  push:
    branches:
      - v3.1*
      - 3.1*
      - dev
      - Codex
    tags:
      - v*
  pull_request:
    branches:
      - dev
      - Codex
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  COIN_NAME: yerbas
  BUILD_DIR: yerbas-build
  COMPRESS_DIR: yerbas-compress
  TEST_DIR: yerbas-test
  FALLBACK_DOWNLOAD_PATH: https://bitcoincore.org/depends-sources
  
permissions:
  contents: read
  checks: write
  id-token: write

jobs:
  get-version:
    name: Get Version
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.selected-version.outputs.version }}

    steps:
      - name: Triggered By
        run: |
          echo "checking out $GITHUB_REF triggered by $GITHUB_EVENT_NAME"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate Version Logic
        id: selected-version
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_VERSION=$(grep '^release-version=' build.properties | cut -d'=' -f2- || true)
          CANDIDATE_VERSION=$(grep '^candidate-version=' build.properties | cut -d'=' -f2- || true)
          SNAPSHOT_VERSION=$(grep '^snapshot-version=' build.properties | cut -d'=' -f2- || true)

          VERSION=""

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            VERSION="${SNAPSHOT_VERSION:-$RELEASE_VERSION}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${RELEASE_VERSION:-${GITHUB_REF_NAME#v}}"
          elif [[ "$GITHUB_REF_NAME" == "dev" || "$GITHUB_REF_NAME" == "Codex" || "$GITHUB_REF_NAME" == v3.1* || "$GITHUB_REF_NAME" == 3.1* ]]; then
            VERSION="${SNAPSHOT_VERSION:-$RELEASE_VERSION}"
          elif [[ "$GITHUB_REF" == refs/heads/release/* ]]; then
            VERSION="${CANDIDATE_VERSION:-$RELEASE_VERSION}"
          elif [[ "$GITHUB_REF_NAME" == "main" || "$GITHUB_REF_NAME" == "master" ]]; then
            VERSION="$RELEASE_VERSION"
          else
            VERSION="${SNAPSHOT_VERSION:-$RELEASE_VERSION}"
          fi

          if [[ -z "$VERSION" ]]; then
            echo "Could not determine build version from build.properties"
            exit 1
          fi

          echo "version is: [$VERSION]"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "BUILD_VERSION=$VERSION" > version.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: version
          path: version.txt


  build-macos-12-x86:
    name: macOS 12 x86 Build
    needs: get-version
    runs-on: macos-15-intel
    env:
      MACOS_LABEL: macOS12
      ARCH_TYPE: x86
      OSX_HOST: x86_64-apple-darwin21

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Required Packages
        shell: bash
        run: |
          set -euo pipefail

          for pkg in automake libtool pkg-config miniupnpc librsvg libnatpmp zeromq python; do
            if ! brew list --versions "$pkg" >/dev/null 2>&1; then
              echo "Installing $pkg..."
              brew install "$pkg"
            else
              echo "$pkg already installed, skipping."
            fi
          done

          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install -U pip setuptools
          python -m pip install ds_store mac_alias
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Build Depends
        shell: bash
        run: |
          set -euo pipefail
          clang++ --version
          xcodebuild -version
          sw_vers
          echo "building with $(sysctl -n hw.ncpu) threads"
          echo "using FALLBACK_DOWNLOAD_PATH=${FALLBACK_DOWNLOAD_PATH}"
          make -C depends -j$(sysctl -n hw.ncpu) HOST=${OSX_HOST}

      - name: Configure
        shell: bash
        run: |
          set -euo pipefail
          ./autogen.sh
          ./configure \
            CXXFLAGS="-Wno-enum-constexpr-conversion -D_LIBCPP_ENABLE_CXX17_REMOVED_UNARY_BINARY_FUNCTION" \
            --prefix=$(pwd)/depends/${OSX_HOST} \
            --disable-bench || {
              echo "===== config.log boost/thread lines ====="
              grep -n -i "boost\|thread\|sleep\|chrono\|unary_function\|enum-constexpr" config.log || true
              exit 1
            }

      - name: Build Binaries
        shell: bash
        run: |
          set -euo pipefail
          make -j$(sysctl -n hw.ncpu)

          mkdir -p "${BUILD_DIR}" "${BUILD_DIR}_not_strip"

          found=0
          for f in src/yerbas-cli src/yerbasd src/yerbas-tx src/qt/yerbas-qt; do
            if [ -f "$f" ]; then
              cp "$f" "${BUILD_DIR}/"
              cp "$f" "${BUILD_DIR}_not_strip/"
              found=1
            else
              echo "Optional binary not found, skipping: $f"
            fi
          done

          if [ "$found" -eq 0 ]; then
            echo "No Yerbas binaries were found to package."
            exit 1
          fi

          for f in "${BUILD_DIR}"/*; do
            if [ -f "$f" ]; then
              xcrun strip -x "$f" || true
            fi
          done

          ls -l "${BUILD_DIR}"
          ls -l "${BUILD_DIR}_not_strip"

      - name: Generate Checksum and Compress
        shell: bash
        run: |
          set -euo pipefail

          pushd "${BUILD_DIR}"
          {
            echo "sha256:"
            for f in *; do
              [ "$f" = "checksums.txt" ] && continue
              shasum -a 256 "$f"
            done
            echo "openssl-sha256:"
            for f in *; do
              [ "$f" = "checksums.txt" ] && continue
              openssl sha256 "$f"
            done
          } > checksums.txt
          /usr/bin/zip -r -9 "../${COIN_NAME}-${MACOS_LABEL}-${ARCH_TYPE}-release-${{ needs.get-version.outputs.version }}.zip" .
          popd

          pushd "${BUILD_DIR}_not_strip"
          {
            echo "sha256:"
            for f in *; do
              [ "$f" = "checksums.txt" ] && continue
              shasum -a 256 "$f"
            done
            echo "openssl-sha256:"
            for f in *; do
              [ "$f" = "checksums.txt" ] && continue
              openssl sha256 "$f"
            done
          } > checksums.txt
          /usr/bin/zip -r -9 "../${COIN_NAME}-${MACOS_LABEL}-${ARCH_TYPE}-notstrip-${{ needs.get-version.outputs.version }}.zip" .
          popd

          mkdir -p "${COMPRESS_DIR}"
          mv ./*.zip "${COMPRESS_DIR}/"

          pushd "${COMPRESS_DIR}"
          {
            echo "Checksums for release archives:"
            echo "------------------------------------"
            for f in *.zip; do
              echo "$f"
              echo "sha256: $(shasum -a 256 "$f")"
              echo "openssl-sha256: $(openssl sha256 "$f")"
              echo "------------------------------------"
            done
          } > checksums.txt
          cat checksums.txt
          popd

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.COIN_NAME }}-${{ env.MACOS_LABEL }}-${{ env.ARCH_TYPE }}-${{ needs.get-version.outputs.version }}
          path: ${{ env.COMPRESS_DIR }}

      - name: Generate macOS dmg files
        shell: bash
        run: |
          set -euo pipefail

          make deploy
          mkdir -p macos-dmg

          DMG_FILE=$(find . -maxdepth 1 -type f -name "*.dmg" -print -quit)
          if [ -z "$DMG_FILE" ]; then
            echo "No dmg file was generated by make deploy."
            exit 1
          fi

          mv "$DMG_FILE" "macos-dmg/Yerbas-Qt-${MACOS_LABEL}-${ARCH_TYPE}.dmg"

          pushd macos-dmg
          {
            for f in *.dmg; do
              echo "sha256: $(shasum -a 256 "$f")"
              echo "openssl-sha256: $(openssl sha256 "$f")"
            done
          } > checksums.txt
          cat checksums.txt
          popd

      - name: Upload dmg file
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.COIN_NAME }}-${{ env.MACOS_LABEL }}-${{ env.ARCH_TYPE }}-dmg-${{ needs.get-version.outputs.version }}
          path: macos-dmg

